type: http
name: Get template details
url: '{{baseUrl}}/templates/:templateId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: templateId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "name": "string",
            "channel": "sms",
            "subject": "string",
            "bodyTemplate": "string",
            "variables": [
              "string",
              "string"
            ],
            "active": true
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Template details
