$schema: https://schema.postman.com/json/draft-2020-12/collection/v3.0.0/
type: collection
name: '[Baseline] GrubHub Notifications API'
description: |-
  REST API for managing push notifications, SMS alerts, and email
  communications across the GrubHub platform.


  Contact Support:
   Name: GrubHub API Platform Team
   Email: api-platform@grubhub.com
id: 91fc9d30-8d62-4df2-87b5-634e07f60616
auth:
  type: apikey
  credentials:
    - key: key
      value: X-API-Key
      type: string
    - key: value
      value: '{{apiKey}}'
      type: string
    - key: in
      value: header
      type: string
variables:
  - key: baseUrl
    value: https://api.grubhub.com/notifications/v1
items:
  - ref: ./notifications/folder.yaml
  - ref: ./preferences/folder.yaml
  - ref: ./templates/folder.yaml
  - ref: ./health/folder.yaml
