type: http
name: Get notification status
url: '{{baseUrl}}/notifications/:notificationId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: notificationId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "userId": "string",
            "channel": "email",
            "templateId": "string",
            "subject": "string",
            "body": "string",
            "status": "delivered",
            "sentAt": "1990-05-10T10:22:24.783Z",
            "deliveredAt": "2014-06-23T01:33:19.333Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Notification details
