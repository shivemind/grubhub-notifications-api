type: http
name: Send a notification
url: '{{baseUrl}}/notifications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "userId": "string",
      "channel": "email",
      "body": "string",
      "templateId": "string",
      "subject": "string",
      "metadata": {
        "key_0": "string"
      }
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "userId": "string",
            "channel": "sms",
            "templateId": "string",
            "subject": "string",
            "body": "string",
            "status": "failed",
            "sentAt": "2003-09-21T04:20:28.496Z",
            "deliveredAt": "1982-11-18T12:26:21.406Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Notification queued
