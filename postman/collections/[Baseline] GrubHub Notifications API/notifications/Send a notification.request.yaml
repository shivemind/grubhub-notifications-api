type: http
name: Send a notification
url: '{{baseUrl}}/notifications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "userId": "string",
      "channel": "email",
      "body": "string",
      "templateId": "string",
      "subject": "string",
      "metadata": {
        "key_0": "string",
        "key_1": "string",
        "key_2": "string"
      }
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "userId": "string",
            "channel": "email",
            "templateId": "string",
            "subject": "string",
            "body": "string",
            "status": "delivered",
            "sentAt": "1990-05-10T10:22:24.783Z",
            "deliveredAt": "2014-06-23T01:33:19.333Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Notification queued
