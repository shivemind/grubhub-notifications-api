type: http
name: List notifications
url: '{{baseUrl}}/notifications?userId=string&channel=sms&status=failed&limit=50'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: userId
    value: string
  - key: channel
    value: sms
  - key: status
    value: failed
  - key: limit
    value: '50'
