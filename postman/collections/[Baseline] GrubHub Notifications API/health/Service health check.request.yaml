type: http
name: Service health check
url: '{{baseUrl}}/health'
method: GET
headers:
  - key: Accept
    value: application/json
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "status": "string",
            "service": "string",
            "version": "string",
            "timestamp": "2005-04-06T08:52:04.694Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Service is healthy
