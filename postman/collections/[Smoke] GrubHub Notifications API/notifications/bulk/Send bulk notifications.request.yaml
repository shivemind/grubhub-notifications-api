type: http
name: Send bulk notifications
url: '{{baseUrl}}/notifications/bulk'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "notifications": [
        {
          "userId": "string",
          "channel": "push",
          "body": "string",
          "templateId": "string",
          "subject": "string",
          "metadata": {
            "key_0": "string",
            "key_1": "string",
            "key_2": "string"
          }
        },
        {
          "userId": "string",
          "channel": "email",
          "body": "string",
          "templateId": "string",
          "subject": "string",
          "metadata": {
            "key_0": "string"
          }
        }
      ]
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "queued": 8738,
            "failed": 1667,
            "batchId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Bulk notifications queued
