type: http
name: List notifications
url: '{{baseUrl}}/notifications?userId=string&channel=email&status=delivered&limit=50'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: userId
    value: string
  - key: channel
    value: email
  - key: status
    value: delivered
  - key: limit
    value: '50'
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "notifications": [
              {
                "id": "string",
                "userId": "string",
                "channel": "sms",
                "templateId": "string",
                "subject": "string",
                "body": "string",
                "status": "failed",
                "sentAt": "2023-12-13T23:52:36.862Z",
                "deliveredAt": "1987-07-21T03:50:10.913Z"
              },
              {
                "id": "string",
                "userId": "string",
                "channel": "push",
                "templateId": "string",
                "subject": "string",
                "body": "string",
                "status": "failed",
                "sentAt": "2019-03-15T08:46:09.968Z",
                "deliveredAt": "1984-07-29T00:58:21.772Z"
              }
            ],
            "total": 8434
          }
      headers:
        - key: Content-Type
          value: application/json
    name: List of notifications
